<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор трат и мечты</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <!-- Шапка страницы: заголовок + подзаголовок + кнопки управления -->
    <header class="page-header">
      <!-- Кнопка сброса данных — слева; спрашивает подтверждение перед очисткой -->
      <button id="btn-reset" class="btn-icon btn-icon--danger" title="Сбросить все данные">🗑</button>
      <!-- Кнопка переключения темы — справа; иконка меняется через JS -->
      <button id="btn-theme-toggle" class="btn-icon" title="Сменить тему">🌙</button>
      <h1>💸 Калькулятор трат и мечты</h1>
      <p class="subtitle">Контролируй расходы — приближай мечту</p>
    </header>

    <!-- ===================== СЕКЦИЯ: ДОХОД ===================== -->
    <section class="card" id="section-income">
      <h2><span class="section-icon">💰</span> Мой доход</h2>
      <label for="income-input">Ежемесячный доход (₽)</label>
      <div class="input-row">
        <input
          type="number"
          id="income-input"
          placeholder="Например: 60000"
          min="0"
        />
        <button id="btn-save-income">Сохранить</button>
      </div>
      <p class="hint">Укажите сумму, которую получаете в месяц после налогов.</p>
    </section>

    <!-- ===================== СЕКЦИЯ: КАТЕГОРИИ ТРАТ ===================== -->
    <section class="card" id="section-categories">
      <h2><span class="section-icon">📋</span> Категории трат</h2>

      <!-- Шаблоны популярных трат: клик заполняет форму ниже -->
      <p class="hint">Быстрый выбор:</p>
      <div id="templates-chips" class="templates-chips">
        <!-- Чипы генерируются через renderTemplates() в app.js -->
      </div>

      <!-- Форма добавления категории -->
      <div class="add-category-form">
        <input
          type="text"
          id="cat-name"
          placeholder="Название (например: Еда)"
          maxlength="40"
        />
        <input
          type="number"
          id="cat-amount"
          placeholder="Сумма (₽)"
          min="0"
        />
        <input
          type="number"
          id="cat-limit"
          placeholder="Лимит в месяц (₽)"
          min="0"
        />
        <select id="cat-period">
          <option value="month" selected>В месяц</option>
        </select>
        <button id="btn-add-category">Добавить</button>
      </div>

      <!-- Список добавленных категорий (заполняется из JS) -->
      <ul id="categories-list" class="categories-list">
        <!-- Пример строки, генерируется через render():
        <li>
          <span class="cat-label">Еда — 15 000 ₽/мес</span>
          <button class="btn-delete" data-id="...">✕</button>
        </li>
        -->
      </ul>
    </section>

    <!-- ===================== СЕКЦИЯ: ИСТОРИЯ ТРАТ ===================== -->
    <section class="card" id="section-expenses">
      <h2><span class="section-icon">📝</span> История трат</h2>
      <p class="hint">Фактические расходы:</p>

      <!-- Форма добавления расхода -->
      <div class="add-expense-form">
        <input
          type="text"
          id="expense-name"
          placeholder="Название расхода"
          maxlength="40"
        />
        <input
          type="text"
          id="expense-date"
          placeholder="день/месяц/год"
          inputmode="numeric"
          maxlength="10"
          title="день/месяц/год"
          aria-label="день/месяц/год"
        />
        <input
          type="number"
          id="expense-amount"
          placeholder="Сумма (₽)"
          min="0"
        />
        <button id="btn-add-expense">Добавить</button>
      </div>

      <!-- Список расходов -->
      <ul id="expenses-list" class="expenses-list">
      </ul>
    </section>

    <!-- ===================== СЕКЦИЯ: ЦЕЛЬ ===================== -->
    <section class="card" id="section-goal">
      <h2><span class="section-icon">✨</span> Моя мечта</h2>
      <label for="goal-name">Название цели</label>
      <input
        type="text"
        id="goal-name"
        placeholder="Например: Поездка в Японию"
        maxlength="60"
      />
      <label for="goal-amount">Нужная сумма (₽)</label>
      <div class="input-row">
        <input
          type="number"
          id="goal-amount"
          placeholder="Например: 200000"
          min="0"
        />
        <button id="btn-save-goal">Сохранить</button>
      </div>
    </section>

    <!-- ===================== СЕКЦИЯ: ИТОГ ===================== -->
    <section class="card" id="section-result">
      <h2><span class="section-icon">📊</span> Итог</h2>
      <!-- Содержимое генерируется через render() в app.js -->
      <div id="result-content">
        <p class="hint">Заполните доход, категории трат и цель — здесь появится расчёт.</p>
      </div>
    </section>
  </div>

  <!-- Подключаем логику приложения -->
  <script src="app.js"></script>
  <!-- Подключаем тесты: они запускаются автоматически и выводят результат в консоль -->
  <script src="app.test.js"></script>

</body>
</html>
